name: Next.js CI/CD

on:

  push:

    branches:
      - main

  pull_request:

    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4

        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build Project
        run: npm run build

  docker:

    needs: build

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t before-her-name-existed .