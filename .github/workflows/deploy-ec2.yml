name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy to AWS EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e

            PROJECT_DIR=/home/ubuntu/before-her-name-existed-documentary

            if [ ! -d "$PROJECT_DIR" ]; then
              git clone https://github.com/itsabhishekme/before-her-name-existed-documentary.git $PROJECT_DIR
            fi

            cd $PROJECT_DIR

            git fetch origin
            git reset --hard origin/main

            npm ci

            npm run build

            if pm2 describe documentary > /dev/null; then
              pm2 restart documentary
            else
              pm2 start npm --name documentary -- start
            fi

            pm2 save